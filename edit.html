<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CXO TC8 資料更新</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Arial','PingFang TC','Microsoft JhengHei',sans-serif; background: #f0f4f8; color: #222; padding: 0 0 40px; }
  .header { background: linear-gradient(135deg,#15296B 0%,#1E40A0 58%,#2B57C4 100%); color: #fff; padding: 26px 22px; display: flex; justify-content: space-between; align-items: center; gap: 14px; flex-wrap: wrap; }
  .review-link { background: rgba(255,255,255,.16); border: 1.5px solid rgba(255,255,255,.5); color: #fff; padding: 9px 16px; border-radius: 9px; font-size: .85rem; font-weight: 700; text-decoration: none; white-space: nowrap; }
  .review-link:hover { background: rgba(255,255,255,.3); }
  .header h1 { font-size: 1.4rem; letter-spacing: 1px; }
  .header p { font-size: .85rem; opacity: .85; margin-top: 4px; }
  .wrap { max-width: 560px; margin: 22px auto; padding: 0 18px; }
  .card { background: #fff; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,.08); padding: 22px; margin-bottom: 18px; }
  label { display: block; font-size: .85rem; font-weight: 600; color: #15296B; margin: 14px 0 5px; }
  input, select, textarea { width: 100%; padding: 11px 13px; border: 1.5px solid #d0d8e4; border-radius: 9px; font-size: .95rem; outline: none; font-family: inherit; }
  input:focus, select:focus, textarea:focus { border-color: #2B57C4; }
  textarea { min-height: 110px; resize: vertical; line-height: 1.6; }
  button { width: 100%; padding: 13px; border: none; border-radius: 9px; background: #1E40A0; color: #fff; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 18px; }
  button:hover { background: #15296B; }
  button:disabled { background: #aab; cursor: default; }
  .hint { font-size: .78rem; color: #888; margin-top: 4px; }
  .msg { padding: 13px; border-radius: 9px; font-size: .9rem; margin-top: 14px; text-align: center; }
  .msg.ok { background: #e6f6ec; color: #1a7a3f; }
  .msg.err { background: #fdecea; color: #c0392b; }
  .hidden { display: none; }
  .locked { font-size: .8rem; color: #999; }
</style>
</head>
<body>
<div class="header">
  <div class="header-text">
    <h1>CXO TC8 資料更新</h1>
    <p>更新你的資料 → 送出 → 經會長審核後上線</p>
  </div>
  <a class="review-link" href="review.html">🔑 幹部審核</a>
</div>
<div class="wrap">

  <!-- 步驟一：密碼 + 選人 -->
  <div class="card" id="step1">
    <label>分會密碼</label>
    <input type="password" id="pw" placeholder="請輸入分會提供的密碼">
    <label>選擇你的名字</label>
    <select id="who"><option value="">— 請先載入名單 —</option></select>
    <div class="hint">選好名字後，下方會帶出你目前的資料</div>
    <button id="pickBtn" onclick="pick()">帶出我的資料</button>
  </div>

  <!-- 步驟二：編輯表單 -->
  <div class="card hidden" id="step2">
    <label>顯示名（姓名／暱稱）</label>
    <input id="f_name">
    <label>公司名稱</label>
    <input id="f_company">
    <label>職稱</label>
    <input id="f_title">
    <label>產業類別（決定卡片顏色與分類）</label>
    <select id="f_industry">
      <option value="edu">教育</option>
      <option value="sport">運動</option>
      <option value="health">醫療保健</option>
      <option value="car">汽車</option>
      <option value="food">餐飲</option>
      <option value="retail">零售</option>
      <option value="mfg">製造</option>
      <option value="it">資訊科技</option>
      <option value="re">不動產</option>
      <option value="fin">金融</option>
      <option value="media">媒體</option>
      <option value="mkt">行銷顧問</option>
      <option value="ag">農業</option>
      <option value="trade">貿易</option>
      <option value="other">其他</option>
    </select>
    <label>產業標籤（卡片上顯示的短詞，例：科技農業）</label>
    <input id="f_tag">
    <label>自我介紹</label>
    <textarea id="f_desc"></textarea>
    <label>一句話自我介紹</label>
    <input id="f_intro" placeholder="用一句話形容你自己">
    <label>可以提供的資源／我擅長</label>
    <textarea id="f_resource"></textarea>
    <label>希望在 TC8 獲得</label>
    <textarea id="f_wish"></textarea>
    <label>官方網站（可留空）</label>
    <input id="f_web" placeholder="https://">
    <p class="locked">※ 幹部頭銜與排序由會長管理，這裡不會更動。</p>
    <button id="submitBtn" onclick="submitForm()">送出更新</button>
    <div id="msg"></div>
  </div>

</div>
<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxda24yHBLXrum3p3CTiLkUTh3ZIE-4XOvAW06Ovy3oAdnx0Xmr-mmBfeRmGmCp5V2VsA/exec';
let members = [], me = null;

async function loadList() {
  try {
    const res = await fetch(API_URL + '?action=members');
    const data = await res.json();
    members = data.members || [];
    const sel = document.getElementById('who');
    sel.innerHTML = '<option value="">— 請選擇 —</option><option value="__NEW__">➕ 我是新成員（不在名單上）</option>' +
      members.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
  } catch (e) {
    document.getElementById('who').innerHTML = '<option>名單載入失敗，請重整</option>';
  }
}

function pick() {
  const id = document.getElementById('who').value;
  if (!id) { alert('請先選擇你的名字'); return; }
  if (id === '__NEW__') {
    me = { id: '' };
    ['f_name','f_company','f_title','f_tag','f_desc','f_web','f_intro','f_resource','f_wish'].forEach(k => document.getElementById(k).value = '');
    document.getElementById('f_industry').value = 'other';
    document.getElementById('f_name').placeholder = '請填你的姓名（暱稱），例：王小明（Ming）';
  } else {
    me = members.find(m => String(m.id) === String(id));
    document.getElementById('f_name').value = me.name || '';
    document.getElementById('f_company').value = me.company || '';
    document.getElementById('f_title').value = me.title || '';
    document.getElementById('f_industry').value = me.industry || 'other';
    document.getElementById('f_tag').value = me.tag || '';
    document.getElementById('f_desc').value = me.desc || '';
    document.getElementById('f_intro').value = me.intro || '';
    document.getElementById('f_resource').value = me.resource || '';
    document.getElementById('f_wish').value = me.wish || '';
    document.getElementById('f_web').value = me.web || '';
  }
  document.getElementById('step2').classList.remove('hidden');
  document.getElementById('step2').scrollIntoView({ behavior: 'smooth' });
}

async function submitForm() {
  const pw = document.getElementById('pw').value;
  if (!pw) { showMsg('請輸入分會密碼', false); return; }
  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '送出中…';
  const payload = {
    id: me.id,
    name: val('f_name'), company: val('f_company'), title: val('f_title'),
    industry: val('f_industry'), tag: val('f_tag'), desc: val('f_desc'), web: val('f_web'),
    intro: val('f_intro'), resource: val('f_resource'), wish: val('f_wish')
  };
  try {
    const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'submit', password: pw, payload }) });
    const data = await res.json();
    if (data.ok) showMsg('已送出，等候會長審核 ✓', true);
    else showMsg(data.error === 'bad password' ? '密碼錯誤，請確認後再送出' : ('送出失敗：' + data.error), false);
  } catch (e) {
    showMsg('送出失敗，請稍後再試', false);
  }
  btn.disabled = false; btn.textContent = '送出更新';
}

function val(id){ return document.getElementById(id).value; }
function showMsg(t, ok){ const m=document.getElementById('msg'); m.className='msg '+(ok?'ok':'err'); m.textContent=t; }

loadList();
</script>
</body>
</html>
